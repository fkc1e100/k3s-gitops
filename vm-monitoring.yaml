apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vm-monitoring
  namespace: argocd
spec:
  project: default
  source:
    chart: victoria-metrics-k8s-stack
    repoURL: https://victoriametrics.github.io/helm-charts
    targetRevision: 0.81.0
    helm:
      values: |
        fullnameOverride: "vm"
        vmagent:
          enabled: true
          spec:
            resources:
              limits:
                cpu: 200m
                memory: 256Mi
              requests:
                cpu: 50m
                memory: 128Mi
            # Configure high liveness and readiness probe tolerance directly on the VMAgent spec to prevent timeouts during reloads on diskless RPi nodes
            livenessProbe:
              initialDelaySeconds: 15
              timeoutSeconds: 10
              periodSeconds: 15
              failureThreshold: 10
            readinessProbe:
              initialDelaySeconds: 15
              timeoutSeconds: 10
              periodSeconds: 15
              failureThreshold: 10
        vmsingle:
          enabled: true
          spec:
            replicaCount: 1
            retentionPeriod: "1"
            resources:
              limits:
                cpu: 1000m
                memory: 1536Mi
              requests:
                cpu: 250m
                memory: 512Mi
            storage:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi
            nodeSelector:
              tier: high-perf
        prometheus-node-exporter:
          enabled: true
          resources:
            limits:
              cpu: 50m
              memory: 50Mi
            requests:
              cpu: 10m
              memory: 20Mi
          extraArgs:
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
          # Increase probe timeouts and startup/failure thresholds to avoid restarts/timeout logs on diskless RPi nodes
          livenessProbe:
            timeoutSeconds: 10
            failureThreshold: 6
            periodSeconds: 15
          readinessProbe:
            timeoutSeconds: 10
            failureThreshold: 6
            periodSeconds: 15
        grafana:
          enabled: true
          adminPassword: admin
          persistence:
            enabled: true
            storageClassName: longhorn
            size: 2Gi
          nodeSelector:
            tier: high-perf
          resources:
            limits:
              cpu: 500m
              memory: 1024Mi
            requests:
              cpu: 100m
              memory: 512Mi
        kubeControllerManager:
          enabled: false
          service:
            enabled: false
        alertmanager:
          enabled: false
        vmalert:
          enabled: false
        kube-state-metrics:
          enabled: true
          resources:
            limits:
              cpu: 100m
              memory: 100Mi
            requests:
              cpu: 20m
              memory: 40Mi
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
