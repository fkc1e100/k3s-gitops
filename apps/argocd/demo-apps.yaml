apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fkcurrie/k3s-gitops.git
    targetRevision: main
    path: apps
    directory:
      exclude: 'argocd/*'
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
