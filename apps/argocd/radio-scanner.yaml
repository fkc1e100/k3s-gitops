apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: radio-scanner
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.github: ""
spec:
  project: default
  source:
    repoURL: https://github.com/fkcurrie/radio-scanner.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: radio-scanner
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
