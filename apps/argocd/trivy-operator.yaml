apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
spec:
  project: default
  source:
    chart: trivy-operator
    repoURL: https://aquasecurity.github.io/helm-charts/
    targetRevision: 0.33.1
    helm:
      values: |
        operator:
          replicas: 1
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
        trivy:
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
        trivyOperator:
          scanJobTolerations:
            - key: "hardware"
              operator: "Equal"
              value: "low-resource"
              effect: "NoSchedule"
        nodeCollector:
          tolerations:
            - key: "hardware"
              operator: "Equal"
              value: "low-resource"
              effect: "NoSchedule"
  destination:
    namespace: trivy-system
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
