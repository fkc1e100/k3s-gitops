apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-client-nfs-subdir-external-provisioner
  namespace: default
  annotations:
    argocd.argoproj.io/tracking-id: cluster-storage:apps/Deployment:default/nfs-client-nfs-subdir-external-provisioner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-subdir-external-provisioner
  template:
    metadata:
      labels:
        app: nfs-subdir-external-provisioner
    spec:
      serviceAccountName: nfs-client-nfs-subdir-external-provisioner
      containers:
      - name: nfs-subdir-external-provisioner
        image: registry.k8s.io/sig-storage/nfs-subdir-external-provisioner:v4.0.2
        env:
        - name: PROVISIONER_NAME
          value: cluster.local/nfs-client-nfs-subdir-external-provisioner
        - name: NFS_SERVER
          value: "192.168.100.200"
        - name: NFS_PATH
          value: /srv/nfs/kubedata
        - name: ARCHIVE_ON_DELETE
          value: "false"
        volumeMounts:
        - name: nfs-root
          mountPath: /persistentvolumes
      volumes:
      - name: nfs-root
        nfs:
          server: "192.168.100.200"
          path: /srv/nfs/kubedata
