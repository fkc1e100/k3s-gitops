apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-nodes
  namespace: argocd
spec:
  project: default
  source:
    path: nodes
    repoURL: https://github.com/fkc1e100/k3s-gitops.git
    targetRevision: HEAD
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
