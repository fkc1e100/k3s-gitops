apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-home-pvc
  namespace: hermes-system
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: longhorn-rwx
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-gateway
  namespace: hermes-system
  labels:
    app: hermes-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-gateway
  template:
    metadata:
      labels:
        app: hermes-gateway
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: tier
                operator: In
                values:
                - high-perf
      containers:
      - name: hermes
        image: 192.168.4.247:32000/fcurrie/hermes-gateway:latest
        imagePullPolicy: Always
        env:
        - name: HERMES_HOME
          value: "/workspace/.hermes"
        volumeMounts:
        - name: hermes-home
          mountPath: /workspace/.hermes
      volumes:
      - name: hermes-home
        persistentVolumeClaim:
          claimName: hermes-home-pvc
---
apiVersion: v1
kind: Namespace
metadata:
  name: hermes-system
